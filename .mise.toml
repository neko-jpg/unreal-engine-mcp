# mise-en-place: 開発環境のバージョン統一
# インストール: https://mise.jdx.dev/getting-started.html
# 使い方:    mise install   # .mise.toml の全ツールをインストール
#            mise trust     # 初回のみ trust が必要

[tools]
# Python ランタイム
python = "3.11"

# Rust ツールチェーン
rust = "stable"

# タスクランナー
just = "latest"

# リンター／フォーマッタ
ruff = "latest"
shfmt = "latest"
shellcheck = "latest"
actionlint = "latest"

# ドキュメント
lychee = "latest"
mdbook = "latest"

# 生産性
ripgrep = "latest"
fd = "latest"
bat = "latest"
fzf = "latest"

# セキュリティ
gitleaks = "latest"

[env]
# Python 仮想環境を自動的に認識
_.python.venv = { path = "Python/.venv", create = true }