name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # releases should not be cancelled

jobs:
  release-please:
    name: Create release PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          release-type: simple
          token: ${{ secrets.GITHUB_TOKEN }}
          # Auto-label and auto-assign
          pull-request-header: "chore: release"
          include-component-in-tag: false