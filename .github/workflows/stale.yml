name: Close stale issues/PRs

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  stale:
    name: Stale bot
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has
            not had recent activity. It will be closed in 14 days if no
            further activity occurs.
          stale-pr-message: >
            This pull request has been automatically marked as stale because
            it has not had recent activity. It will be closed in 14 days if
            no further activity occurs.
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
          days-before-stale: 60
          days-before-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          exempt-issue-labels: 'pinned,security,enhancement,epic'
          exempt-pr-labels: 'pinned,security,dependencies'
          operations-per-run: 120
