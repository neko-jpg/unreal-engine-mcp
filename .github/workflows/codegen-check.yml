name: Codegen check

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codegen-check:
    name: Codegen is up-to-date
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Regenerate codegen output
        run: uv run python tools/generate_codegen.py
      - name: Check working tree is clean
        run: |
          if ! git diff --quiet --exit-code; then
            echo "Codegen output is stale. Run 'just codegen' and commit the changes."
            git diff --stat
            exit 1
          fi
          echo "Codegen is up-to-date."