name: Rust Tests (nextest)

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nextest-part-1:
    name: Test (nextest, 1/2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rust/scene-syncd
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --all-features --no-tests=warn --partition hash:1/2
      - name: Report test results (1/2)
        if: success() || failure()
        run: cargo nextest run --all-features --no-tests=warn --partition hash:1/2 --message-format libtest-json 2>/dev/null || true

  nextest-part-2:
    name: Test (nextest, 2/2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rust/scene-syncd
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --all-features --no-tests=warn --partition hash:2/2
      - name: Report test results (2/2)
        if: success() || failure()
        run: cargo nextest run --all-features --no-tests=warn --partition hash:2/2 --message-format libtest-json 2>/dev/null || true