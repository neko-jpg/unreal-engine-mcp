name: Python tests (234-stubs Wave 0 expansion)

# 234-stubs Wave 0 (#74): unit + contract + envelope-helper tests, plus the
# new helper smoke that asserts the executed-or-error envelope contract holds
# for the seed test cases.

on:
  push:
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev

      - name: Compile-all sanity
        run: uv run python -m compileall .

      - name: Unit tests (incl. envelope helpers #72)
        run: uv run pytest tests/unit -q

      - name: Contract tests
        run: uv run pytest tests/contract -q

      - name: E2E (no-unreal mode)
        run: uv run pytest tests/e2e --skip-unreal -q

      - name: live_e2e_smoke list-groups (sanity)
        working-directory: ${{ github.workspace }}
        run: |
          python scripts/live_e2e_smoke.py --list-groups > /tmp/groups.json
          test -s /tmp/groups.json
          cat /tmp/groups.json
