name: mypy

on:
  push:
  pull_request:

jobs:
  mypy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: Python/uv.lock
      - run: uv sync --extra dev
      - name: Run mypy (advisory)
        # mypy currently surfaces ~534 pre-existing union-attr / no_implicit_optional
        # diagnostics in server/. The step is marked advisory until those are paid
        # down in subsequent M2/M3 PRs. Concrete runtime bugs uncovered by mypy
        # are fixed alongside (see commit d30bccc and follow-ups).
        continue-on-error: true
        run: uv run mypy server helpers
