name: mypy

on:
  push:
  pull_request:

jobs:
  mypy:
    runs-on: ubuntu-latest
    # mypy currently surfaces ~538 pre-existing union-attr / no_implicit_optional
    # warnings in server/. The check is wired as advisory until those are paid
    # down in subsequent M2/M3 PRs. Real runtime bugs uncovered by mypy are
    # fixed in the same commit that added this advisory.
    continue-on-error: true
    defaults:
      run:
        working-directory: Python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Run mypy (advisory)
        run: uv run mypy server helpers
