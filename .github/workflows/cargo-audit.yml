name: Cargo Audit

on:
  schedule:
    - cron: '0 5 * * 1'  # Every Monday 05:00 UTC
  push:
    paths:
      - 'rust/**/Cargo.lock'
      - 'rust/**/Cargo.toml'
      - 'rust/**/deny.toml'
  pull_request:
    paths:
      - 'rust/**/Cargo.lock'
      - 'rust/**/Cargo.toml'

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/scene-syncd
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - name: Run cargo-audit
        continue-on-error: true
        run: cargo audit --json > audit-report.json 2>&1 || true
      - name: Check for critical advisories
        run: |
          if cargo audit --deny warnings 2>&1 | grep -q "RUSTSEC-"; then
            echo "::warning::Security advisories found. Run 'cargo audit' locally for details."
          fi
        shell: bash

  deny:
    name: License & advisory check (cargo-deny)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/scene-syncd
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo-deny check --all-features