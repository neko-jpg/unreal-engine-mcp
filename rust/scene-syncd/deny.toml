# cargo-deny configuration for scene-syncd.
# Enforces license, advisory, and source policies described in
# docs/implementation-plan-remaining.md (CI hardening).

[graph]
all-features = true

[advisories]
# RustSec advisories database.
yanked = "warn"
ignore = [
    # Transitive through surrealdb 2.2.2. RustSec marks bincode 1.3.3
    # unmaintained, but the advisory states there is no safe upgrade and that
    # 1.3.3 is considered complete by its maintainers.
    "RUSTSEC-2025-0141",
    # Transitive through surrealkv 0.8.1 -> lru 0.12.x. scene-syncd does not
    # call lru::IterMut directly; keep tracked until SurrealDB upgrades surrealkv.
    "RUSTSEC-2026-0002",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unlicense",
    "BUSL-1.1",
    "OpenSSL",
]
confidence-threshold = 0.93

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]


[[licenses.clarify]]
name = "surrealdb"
expression = "BUSL-1.1"
license-files = [
    { path = "LICENSE", hash = 0x2273894e },
]

[[licenses.clarify]]
name = "surrealdb-core"
expression = "BUSL-1.1"
license-files = [
    { path = "LICENSE", hash = 0x2273894e },
]
[bans]
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
