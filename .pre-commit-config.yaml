# Pre-commit フック設定
# インストール: pip install pre-commit && pre-commit install
# CI 実行:    pre-commit run --all-files
repos:
  # ── Ruff: Python リンター + フォーマッタ ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.5
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # ── mypy: Python 型チェック ──
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-PyYAML>=6.0
          - types-requests>=2.32
        args: [--config-file, Python/pyproject.toml]
        # mypy は重いので pre-commit ではパスを限定
        files: ^Python/server/
        pass_filenames: false

  # ── 汎用チェック ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: >
          (?x)^(
            .*\.md|
            .*\.generated\.h|
            .*\.gen\.cpp
          )$
      - id: end-of-file-fixer
        exclude: >
          (?x)^(
            .*\.generated\.h|
            .*\.gen\.cpp
          )$
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Typo チェック ──
  - repo: https://github.com/crate-ci/typos
    rev: v1.31.1
    hooks:
      - id: typos
        args: []
        exclude: >
          (?x)^(
            .*\.generated\.h|
            .*\.gen\.cpp|
            rust/.*/target/.*
          )$

  # ── ShellCheck: シェルスクリプトの静的解析 ──
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]
        files: \.sh$

  # ── Bandit: Python セキュリティスキャン ──
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [--configfile, Python/pyproject.toml]
        files: ^Python/(server|helpers)/
        pass_filenames: false
        additional_dependencies: ["bandit[toml]"]

  # ── codespell: スペルミスチェック ──
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: ['--ignore-words-list=', '--skip=*.lock,*.svg,*.png,*.jpg,*.woff,*.woff2,*.ico']
        additional_dependencies: ['tomli>=2']

  # ── Vale: ドキュメント文章品質チェック ──
  - repo: https://github.com/errata-ai/vale-pre-commit
    rev: v3.0.7
    hooks:
      - id: vale
        args: ['--config=.vale.ini', '--glob=*.md']
        additional_dependencies: ['vale>=3.0']

  # ── basedpyright: Python 型チェック（mypy と補完関係） ──
  - repo: https://github.com/DetachHead/basedpyright-pre-commit-mirror
    rev: v1.28.5
    hooks:
      - id: basedpyright
        args: [--project, Python/pyproject.toml]
        files: ^Python/(server|helpers)/
        pass_filenames: false

  # ── Gitleaks: シークレット漏洩チェック ──
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks
        args: [--config=.gitleaks.toml]

  # ── Conventional Commits: コミットメッセージの検査 ──
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - -feat
          - -fix
          - -chore
          - -docs
          - -refactor
          - -test
          - -style
          - -perf
          - -ci
