assets:
  # --- Basic Shapes (fallback meshes for prototype realization) ---
  basic_cube:
    kind: static_mesh
    variants:
      medieval: { mesh: "/Game/Architecture/Walls/StoneWall_01" }
      futuristic: { mesh: "/Game/SciFi/Walls/PanelWall_A" }
      modern: { mesh: "/Game/Architecture/Walls/ConcreteWall_A" }
    default_scale: [1.0, 1.0, 1.0]
    collision_profile: "BlockAll"
    navmesh: "obstacle"
    fallback: "/Engine/BasicShapes/Cube.Cube"

  basic_cylinder:
    kind: static_mesh
    variants:
      medieval: { mesh: "/Game/Architecture/Columns/StoneColumn_01" }
      futuristic: { mesh: "/Game/SciFi/Columns/MetalColumn_A" }
      modern: { mesh: "/Game/Architecture/Columns/ConcreteColumn_A" }
    default_scale: [1.0, 1.0, 1.0]
    collision_profile: "BlockAll"
    navmesh: "obstacle"
    fallback: "/Engine/BasicShapes/Cylinder.Cylinder"

  basic_sphere:
    kind: static_mesh
    variants:
      medieval: { mesh: "/Game/Architecture/Decor/StoneSphere_01" }
      futuristic: { mesh: "/Game/SciFi/Decor/HoloSphere_A" }
    default_scale: [1.0, 1.0, 1.0]
    collision_profile: "BlockAll"
    navmesh: "obstacle"
    fallback: "/Engine/BasicShapes/Sphere.Sphere"

  basic_plane:
    kind: static_mesh
    variants:
      medieval: { mesh: "/Game/Architecture/Floors/WoodFloor_01" }
      modern: { mesh: "/Game/Architecture/Floors/ParquetFloor_A" }
      futuristic: { mesh: "/Game/SciFi/Floors/MetalFloor_A" }
    default_scale: [1.0, 1.0, 1.0]
    collision_profile: "BlockAll"
    navmesh: "walkable"
    fallback: "/Engine/BasicShapes/Plane.Plane"

  # --- Architecture ---
  wall_stone:
    kind: static_mesh
    variants:
      medieval: { mesh: "/Game/Architecture/Walls/StoneWall_01" }
      futuristic: { mesh: "/Game/SciFi/Walls/PanelWall_A" }
    default_scale: [1.0, 1.0, 1.0]
    collision_profile: "BlockAllDynamic"
    navmesh: "obstacle"
    fallback: "/Engine/BasicShapes/Cube.Cube"

  floor_wood:
    kind: static_mesh
    variants:
      medieval: { mesh: "/Game/Architecture/Floors/WoodFloor_01" }
      modern: { mesh: "/Game/Architecture/Floors/ParquetFloor_A" }
    default_scale: [1.0, 1.0, 1.0]
    collision_profile: "BlockAll"
    navmesh: "walkable"
    fallback: "/Engine/BasicShapes/Plane.Plane"

  roof_tile:
    kind: static_mesh
    variants:
      medieval: { mesh: "/Game/Architecture/Roofs/TileRoof_01" }
      asian: { mesh: "/Game/Architecture/Roofs/PagodaRoof_A" }
    default_scale: [1.0, 1.0, 1.0]
    collision_profile: "BlockAll"
    navmesh: "obstacle"
    fallback: "/Engine/BasicShapes/Cube.Cube"

  door_wooden:
    kind: static_mesh
    variants:
      medieval: { mesh: "/Game/Architecture/Doors/WoodenDoor_01" }
      futuristic: { mesh: "/Game/SciFi/Doors/AutoDoor_A" }
    default_scale: [1.0, 2.0, 0.2]
    collision_profile: "BlockAllDynamic"
    navmesh: "obstacle"
    fallback: "/Engine/BasicShapes/Cube.Cube"

  window_glass:
    kind: static_mesh
    variants:
      medieval: { mesh: "/Game/Architecture/Windows/StainedGlass_01" }
      modern: { mesh: "/Game/Architecture/Windows/GlassWindow_A" }
    default_scale: [1.0, 1.0, 0.1]
    collision_profile: "OverlapAll"
    navmesh: "obstacle"
    fallback: "/Engine/BasicShapes/Plane.Plane"

  column_stone:
    kind: static_mesh
    variants:
      medieval: { mesh: "/Game/Architecture/Columns/StoneColumn_01" }
      futuristic: { mesh: "/Game/SciFi/Columns/MetalColumn_A" }
    default_scale: [1.0, 1.0, 1.0]
    collision_profile: "BlockAllDynamic"
    navmesh: "obstacle"
    fallback: "/Engine/BasicShapes/Cylinder.Cylinder"

  staircase_stone:
    kind: static_mesh
    variants:
      medieval: { mesh: "/Game/Architecture/Stairs/StoneStaircase_01" }
      modern: { mesh: "/Game/Architecture/Stairs/ConcreteStaircase_A" }
    default_scale: [1.0, 1.0, 1.0]
    collision_profile: "BlockAll"
    navmesh: "walkable"
    fallback: "/Engine/BasicShapes/Cube.Cube"

  # --- Lighting ---
  torch_wall:
    kind: blueprint
    variants:
      medieval: { blueprint: "/Game/Blueprints/TorchWall_BP" }
    default_scale: [1.0, 1.0, 1.0]
    collision_profile: "NoCollision"
    navmesh: "obstacle"
    fallback: "/Engine/BasicShapes/Sphere.Sphere"

  lantern_ceiling:
    kind: blueprint
    variants:
      modern: { blueprint: "/Game/Blueprints/CeilingLantern_BP" }
      futuristic: { blueprint: "/Game/SciFi/Blueprints/LEDPanel_BP" }
    default_scale: [1.0, 1.0, 1.0]
    collision_profile: "NoCollision"
    navmesh: "obstacle"
    fallback: "/Engine/BasicShapes/Sphere.Sphere"

  # --- Materials ---
  mat_stone:
    kind: material
    variants:
      medieval: { material: "/Game/Materials/Stone_Mat" }
      rough: { material: "/Game/Materials/RoughStone_Mat" }
    fallback: "/Engine/BasicShapes/BasicShapeMaterial.BasicShapeMaterial"

  mat_wood:
    kind: material
    variants:
      medieval: { material: "/Game/Materials/Wood_Mat" }
      dark: { material: "/Game/Materials/DarkWood_Mat" }
    fallback: "/Engine/BasicShapes/BasicShapeMaterial.BasicShapeMaterial"

  mat_metal:
    kind: material
    variants:
      futuristic: { material: "/Game/SciFi/Materials/BrushedMetal_Mat" }
      medieval: { material: "/Game/Materials/WroughtIron_Mat" }
    fallback: "/Engine/BasicShapes/BasicShapeMaterial.BasicShapeMaterial"