name: heroic
description: Bright, warm, high-contrast, golden-hour mood for epic moments.

lighting:
  intensity_multiplier: 1.6
  color_bias: [1.0, 0.95, 0.78]
  temperature_kelvin: 5500
  shadow_enabled: true
  volumetric_scattering: 0.8

material:
  base_color_bias: [1.0, 0.96, 0.85, 1.0]
  roughness: 0.55
  metallic: 0.2

atmosphere:
  fog_density_scale: 0.5
  fog_color: [0.92, 0.85, 0.75]
  volumetric_fog: false
  sky_brightness: 1.4

audio:
  ambient_sounds: ["wind_high", "horns"]
  volume: 0.5

vfx:
  dust: true
  embers: medium
  density_multiplier: 0.7

post_process:
  saturation: 1.2
  contrast: 1.25
  bloom_intensity: 1.0
