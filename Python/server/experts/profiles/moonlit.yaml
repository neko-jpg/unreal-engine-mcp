name: moonlit
description: Cool blue ambient, low intensity, soft shadows for nighttime exteriors.

lighting:
  intensity_multiplier: 0.45
  color_bias: [0.55, 0.65, 0.95]
  temperature_kelvin: 6500
  shadow_enabled: true
  volumetric_scattering: 0.7

material:
  base_color_bias: [0.5, 0.55, 0.7, 1.0]
  roughness: 0.7
  metallic: 0.1

atmosphere:
  fog_density_scale: 0.8
  fog_color: [0.18, 0.22, 0.32]
  volumetric_fog: true
  sky_brightness: 0.4

audio:
  ambient_sounds: ["crickets", "owl"]
  volume: 0.4

vfx:
  dust: false
  embers: none
  density_multiplier: 0.0

post_process:
  saturation: 0.85
  contrast: 1.1
  bloom_intensity: 0.6
