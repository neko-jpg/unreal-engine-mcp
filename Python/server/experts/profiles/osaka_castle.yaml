name: osaka_castle
description: Stylized samurai-era stone+wood castle aesthetic with overcast skies.

lighting:
  intensity_multiplier: 1.0
  color_bias: [0.95, 0.92, 0.88]
  temperature_kelvin: 5200
  shadow_enabled: true

material:
  base_color_bias: [0.88, 0.82, 0.72, 1.0]
  roughness: 0.65
  metallic: 0.05

atmosphere:
  fog_density_scale: 0.6
  fog_color: [0.78, 0.78, 0.80]
  volumetric_fog: false
  sky_brightness: 0.9

audio:
  ambient_sounds: ["wind_mid", "distant_bell"]
  volume: 0.45

vfx:
  dust: true
  embers: low
  density_multiplier: 0.3

post_process:
  saturation: 0.95
  contrast: 1.05
  bloom_intensity: 0.5
