name: creepy
description: Dim, cold, wet, slightly desaturated cave/dungeon mood.

lighting:
  intensity_multiplier: 0.35
  color_bias: [0.18, 0.22, 0.28]
  temperature_kelvin: 4200
  flicker: true
  shadow_enabled: true
  volumetric_scattering: 0.6

material:
  base_color_bias: [0.18, 0.18, 0.22, 1.0]
  roughness: 0.92
  metallic: 0.0
  wetness: 0.35

atmosphere:
  fog_density_scale: 2.0
  fog_color: [0.12, 0.14, 0.18]
  volumetric_fog: true
  sky_brightness: 0.5

audio:
  ambient_sounds: ["drip", "low_wind"]
  volume: 0.35
  attenuation_radius: 600.0

vfx:
  dust: true
  embers: low
  density_multiplier: 0.4

post_process:
  saturation: 0.7
  contrast: 1.15
  bloom_intensity: 0.4
