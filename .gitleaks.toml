# Gitleaks 設定: Unreal MCP プロジェクト用
# インストール: https://github.com/gitleaks/gitleaks
# 実行: gitleaks detect --verbose

title = "Unreal MCP Gitleaks Config"

# プロジェクト固有の許可リスト
[allowlist]
description = "Unreal MCP の認証トークンと mcp_id は意図的な設計"
regexes = [
    # UNREAL_MCP_AUTH_TOKEN は env 経由の認証機構
    r"UNREAL_MCP_AUTH_TOKEN",
    # mcp_id:xxxx タグによるアクター追跡
    r"mcp_id:\w+",
    # UE デフォルトのプレースホルダー
    r"YourProjectName",
    r"YourGameMode",
    # テスト用のダミー値
    r"YourEmail@example\.com",
    r"password",
    r"secret",
    r"token",
    r"auth_token",
]

# 拡張ルール: 大きな数字だけの疑似パスワードを誤検知しない
[extendrules]
# デフォルトルールをより厳密に
useDefault = true

# パス除外: 生成コードやサードパーティはスキャンしない
[allowlist.paths]
  - '.*\.generated\.h'
  - '.*\.gen\.cpp'
  - 'rust/.*/target/.*'
  - '.*/node_modules/.*'
  - '\.opencode/.*'
  - 'FlopperamUnrealMCP 5\.7/.*'
